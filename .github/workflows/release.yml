name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# === GitHub Secrets 配置说明 ===
# 需要在仓库 Settings > Secrets and variables > Actions 中添加：
#   TAURI_PRIVATE_KEY: src-tauri/keys 文件内容
#   TAURI_KEY_PASSWORD: 生成密钥时设置的密码
# 如果未配置 Secrets，构建会产生未签名的安装包，更新功能不可用。
env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "yi-app"

      - name: Build
        run: npm install && npm run tauri build

      - name: Generate update manifest
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle/msi"

          echo "Looking for MSI in: ${BUNDLE_DIR}"
          ls -la "${BUNDLE_DIR}/" 2>/dev/null || true

          # Find MSI file (required)
          MSI_FILE=$(ls "${BUNDLE_DIR}"/*.msi 2>/dev/null | head -1)
          if [ -z "${MSI_FILE}" ]; then
            echo "ERROR: No MSI file found in ${BUNDLE_DIR}"
            exit 1
          fi
          MSI_NAME=$(basename "${MSI_FILE}")
          echo "Found MSI: ${MSI_NAME}"

          # Find signature file (optional - only present if signing keys are configured)
          SIGNATURE=""
          SIG_FILE=$(ls "${BUNDLE_DIR}"/*.sig 2>/dev/null | head -1 || true)
          if [ -n "${SIG_FILE}" ]; then
            SIGNATURE=$(cat "${SIG_FILE}")
            echo "Found signature file"
          else
            echo "No .sig file found (signing keys not configured)"
          fi

          RELEASE_URL="https://github.com/nicheng251/Yi/releases/download/${GITHUB_REF_NAME}/${MSI_NAME}"

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Release ${GITHUB_REF_NAME}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${RELEASE_URL}"
              }
            }
          }
          EOF

          echo "Generated update manifest:"
          cat latest.json

      - name: Upload
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.sig
            latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
